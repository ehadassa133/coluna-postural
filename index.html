<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Coluna Postural</title>

<style>

body{
    margin:0;
    padding:0;
    background:#f2f2f2;
    overflow:hidden;
    font-family:Arial;
}

#container{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

canvas{
    background:white;
    border-radius:15px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.15);
}

#info{
    margin-top:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div id="container">

<canvas
id="canvas"
width="450"
height="550">
</canvas>

<div id="info">

<div>
Curvatura:
<span id="curvatura">
0
</span>
°
</div>

<div>
Índice Postural:
<span id="indice">
100
</span>
%
</div>

<div>
Status:
<span id="status">
POSTURA_CORRETA
</span>
</div>

</div>

</div>

<script>

//=====================================================
// VARIÁVEIS
//=====================================================

let x_lombar = 0;
let y_lombar = 0;

let x_meio = 0;
let y_meio = 7.5;

let x_superior = 0;
let y_superior = 15;

let curvatura = 0;
let indice_postural = 100;
let status_postura = "POSTURA_CORRETA";

//=====================================================
// RECEPÇÃO DOS DADOS DO TAGOIO
//=====================================================

window.addEventListener(

"message",

function(event){

    try{

        let dados =
        event.data;

        console.log(
        "TAGOIO:",
        dados
        );

        if(
        dados == null
        )
        return;

        if(
        typeof dados
        ==
        "object"
        ){

            if(
            dados.x_lombar
            != undefined
            )
            x_lombar =
            Number(
            dados.x_lombar
            );

            if(
            dados.y_lombar
            != undefined
            )
            y_lombar =
            Number(
            dados.y_lombar
            );

            if(
            dados.x_meio
            != undefined
            )
            x_meio =
            Number(
            dados.x_meio
            );

            if(
            dados.y_meio
            != undefined
            )
            y_meio =
            Number(
            dados.y_meio
            );

            if(
            dados.x_superior
            != undefined
            )
            x_superior =
            Number(
            dados.x_superior
            );

            if(
            dados.y_superior
            != undefined
            )
            y_superior =
            Number(
            dados.y_superior
            );

            if(
            dados.curvatura
            != undefined
            )
            curvatura =
            Number(
            dados.curvatura
            );

            if(
            dados.indice_postural
            != undefined
            )
            indice_postural =
            Number(
            dados.indice_postural
            );

            if(
            dados.status_postura
            != undefined
            )
            status_postura =
            dados.status_postura;

        }

    }

    catch(e){

        console.log(
        e
        );

    }

}

//);

//=====================================================
// CANVAS
//=====================================================

const canvas =
document.getElementById(
"canvas"
);

const ctx =
canvas.getContext(
"2d"
);

const escala = 18;

//=====================================================

function desenhar(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

let origemX =
canvas.width/2;

let origemY =
500;

let p1x =
origemX +
x_lombar * escala;

let p1y =
origemY -
y_lombar * escala;

let p2x =
origemX +
x_meio * escala;

let p2y =
origemY -
y_meio * escala;

let p3x =
origemX +
x_superior * escala;

let p3y =
origemY -
y_superior * escala;

// eixo

ctx.beginPath();

ctx.moveTo(
origemX,
30
);

ctx.lineTo(
origemX,
510
);

ctx.lineWidth =
2;

ctx.strokeStyle =
"#dddddd";

ctx.stroke();

// cor da coluna

let cor =
"#00aa00";

if(
curvatura > 8
)
cor =
"#ffaa00";

if(
curvatura > 15
)
cor =
"#cc0000";

// linha

ctx.beginPath();

ctx.moveTo(
p1x,
p1y
);

ctx.lineTo(
p2x,
p2y
);

ctx.lineTo(
p3x,
p3y
);

ctx.strokeStyle =
cor;

ctx.lineWidth =
8;

ctx.stroke();

// lombar

ctx.beginPath();

ctx.arc(
p1x,
p1y,
12,
0,
Math.PI*2
);

ctx.fillStyle =
cor;

ctx.fill();

// meio

ctx.beginPath();

ctx.arc(
p2x,
p2y,
12,
0,
Math.PI*2
);

ctx.fillStyle =
cor;

ctx.fill();

// superior

ctx.beginPath();

ctx.arc(
p3x,
p3y,
12,
0,
Math.PI*2
);

ctx.fillStyle =
cor;

ctx.fill();

document
.getElementById(
"curvatura"
)
.innerHTML =
curvatura.toFixed(
2
);

document
.getElementById(
"indice"
)
.innerHTML =
indice_postural.toFixed(
0
);

document
.getElementById(
"status"
)
.innerHTML =
status_postura;

}

//=====================================================
// ANIMAÇÃO DE BACKUP
//=====================================================
// Se o TagoIO não enviar dados,
// pelo menos sabemos que o HTML abriu.
//=====================================================

let t = 0;

setInterval(function(){

t += 0.05;

if(
x_lombar == 0 &&
x_meio == 0 &&
x_superior == 0
){

x_lombar = 0;
y_lombar = 0;

x_meio =
Math.sin(
t
) * 1.5;

y_meio =
7.5;

x_superior =
Math.sin(
t
) * 3;

y_superior =
15;

curvatura =
Math.abs(
x_superior
) * 5;

indice_postural =
100 -
curvatura * 3;

if(
indice_postural < 0
)
indice_postural = 0;

}

desenhar();

},100);

//=====================================================

desenhar();

//=====================================================

</script>

</body>

</html>
